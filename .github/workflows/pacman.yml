name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: hugopm/github-readme-pacman@v1.0
        with:
          github_user_name: leoferreira9
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_dir: dist
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
